name: Update KEMP rainfall

on:
  schedule:
    # every 6 hours, on the hour (UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "run_update.py"
      - ".github/workflows/update.yml"

permissions:
  contents: write

concurrency:
  group: update-kemp
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch + chart
        run: python run_update.py

      - name: Commit updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add KEMP_obhistory_running.csv KEMP_rainfall_running.csv KEMP_rainfall_14d.png
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh KEMP obhistory + chart ($(date -u +'%Y-%m-%dT%H:%MZ'))"
            git push
          fi
